<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Andanada 12 · V10.1</title>
<meta name="theme-color" content="#0b4ea2" />
<link rel="manifest" href="manifest.json" />
<style>
:root{
  --red:#d71920;--redDark:#b71218;--blue:#0b4ea2;--blueDark:#08366f;--ink:#101828;--muted:#667085;--bg:#f6f8fc;--card:#fff;--line:#e5e7ef;--amber:#ffb703;--green:#12b76a;--shadow:0 12px 34px rgba(16,24,40,.10)
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:92px}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.checks{height:18px;background-color:#fff;background-image:linear-gradient(45deg,var(--blue) 25%,transparent 25%),linear-gradient(-45deg,var(--blue) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,var(--blue) 75%),linear-gradient(-45deg,transparent 75%,var(--blue) 75%);background-size:32px 32px;background-position:0 0,0 16px,16px -16px,-16px 0}
.header{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:18px 20px 14px}.smileImg{width:70px;height:70px;border-radius:50%;object-fit:cover;background:#fff;border:3px solid #fff;box-shadow:0 5px 16px rgba(11,78,162,.18);flex:0 0 auto}.title h1{font-size:34px;line-height:1;margin:0;color:var(--red);letter-spacing:.5px;font-weight:900}.title p{margin:6px 0 0;color:#475467;font-weight:750}.v{font-size:13px;color:var(--blue);font-weight:900}.refresh{border:0;border-radius:18px;background:linear-gradient(135deg,var(--red),var(--redDark));color:#fff;font-weight:900;font-size:16px;padding:15px 17px;box-shadow:0 8px 22px rgba(215,25,32,.24)}
.searchRow{display:grid;grid-template-columns:1fr auto;gap:10px;padding:0 20px 14px}.search{width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;padding:15px 17px;font-size:17px;outline:none}.stamp{display:flex;align-items:center;color:#667085;font-weight:800;white-space:nowrap}.tabs{display:flex;gap:10px;overflow-x:auto;padding:8px 20px 12px;border-top:1px solid #f1f2f6;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:13px 18px;font-weight:900;color:#17365f;white-space:nowrap;box-shadow:0 5px 14px rgba(16,24,40,.05)}.tab.active{background:linear-gradient(135deg,var(--blue),var(--blueDark));color:#fff;border-color:transparent}.content{padding:24px 20px}.section-title{font-size:28px;margin:14px 0 18px;color:#0b326a;font-weight:950}.card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:22px;margin:0 0 18px;box-shadow:var(--shadow);overflow:hidden}.event{display:grid;grid-template-columns:64px 1fr;gap:14px;align-items:start}.icon{width:56px;height:56px;border-radius:18px;background:#eef5ff;display:grid;place-items:center;font-size:27px}.event h3{font-size:25px;line-height:1.12;margin:0 0 8px;font-weight:950;color:#162033}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0 10px}.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#eef5ff;color:#0b326a;font-weight:900;padding:8px 12px;font-size:14px}.chip.red{background:#ffe9ec;color:#a50f17}.chip.amber{background:#fff3cd;color:#8a5a00}.desc{font-size:18px;line-height:1.45;color:#475467;white-space:pre-line}.sub{font-size:18px;line-height:1.45;color:#344054;white-space:pre-line}.event-img{width:100%;max-height:360px;object-fit:cover;border-radius:20px;margin-top:14px;border:1px solid var(--line);background:#f2f4f7}.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.miniBtn{border:0;border-radius:14px;background:#0b4ea2;color:#fff;font-weight:900;padding:11px 14px;text-decoration:none;display:inline-flex}.miniBtn.light{background:#eef5ff;color:#0b326a}.urgent{background:linear-gradient(135deg,#d71920,#ff4d4f);color:#fff;border:0;box-shadow:0 15px 35px rgba(215,25,32,.25)}.urgent h2{margin:0 0 6px;font-size:24px}.urgent .desc,.urgent .sub{color:#fff}.urgent .chip{background:rgba(255,255,255,.20);color:#fff}.empty{background:#fff;border:1px dashed #ccd3df;border-radius:22px;padding:24px;color:#667085;font-weight:800;text-align:center}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.quick{background:#fff;border:1px solid #dbe7f9;border-radius:24px;padding:18px;min-height:116px;display:grid;place-items:center;text-align:center;font-weight:950;color:#0b326a;box-shadow:var(--shadow)}.quick span{font-size:34px;display:block;margin-bottom:8px}.quick.repeat{border-color:#d1fadf}.quick.no{border-color:#ffdadf}.dayHeader{position:sticky;top:190px;background:rgba(246,248,252,.94);backdrop-filter:blur(8px);z-index:5;padding:12px 4px 8px;margin:12px 0;color:#0b326a;font-weight:950;font-size:22px}.barGood{border-left:8px solid var(--green)}.barBad{border-left:8px solid #f04438}.moment{border-left:8px solid #7a5af8}.photoGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.photoGrid img{width:100%;height:150px;object-fit:cover;border-radius:18px;border:1px solid var(--line)}
.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-top:1px solid var(--line);z-index:30}.bottom-inner{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:10px 8px calc(10px + env(safe-area-inset-bottom))}.navBtn{border:0;background:transparent;border-radius:18px;padding:9px 5px;font-weight:950;color:#475467}.navBtn .nicon{font-size:24px;display:block}.navBtn.active{background:#eef5ff;color:#0b4ea2}.modal{display:none;position:fixed;inset:0;background:rgba(16,24,40,.55);z-index:50;padding:20px;align-items:center;justify-content:center}.modal.open{display:flex}.modal-box{background:#fff;border-radius:28px;max-width:720px;width:100%;max-height:85vh;overflow:auto}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}.modal-title{font-size:22px;font-weight:950}.close{border:0;background:#eef5ff;border-radius:14px;padding:9px 12px;font-weight:950}.modal-body{padding:20px}.modal-img{width:100%;border-radius:20px;margin:12px 0}.debug{font:13px ui-monospace,Consolas,monospace;white-space:pre-wrap;background:#101828;color:#e2e8f0;border-radius:20px;padding:16px;overflow:auto}.noticePill{display:inline-flex;align-items:center;gap:8px;background:#fff1f3;color:#b42318;border-radius:999px;padding:10px 14px;font-weight:950;margin-bottom:14px}
@media(max-width:520px){.header{grid-template-columns:auto 1fr auto;padding:15px 14px 12px;gap:10px}.smileImg{width:58px;height:58px}.title h1{font-size:28px}.title p{font-size:15px}.refresh{font-size:14px;padding:13px 14px}.searchRow{grid-template-columns:1fr;padding:0 14px 12px}.tabs{padding-left:14px}.content{padding:20px 14px}.event{grid-template-columns:54px 1fr}.icon{width:48px;height:48px;font-size:24px}.event h3{font-size:22px}.desc,.sub{font-size:17px}.grid{gap:11px}.quick{padding:14px;min-height:105px}.dayHeader{top:176px}.photoGrid img{height:125px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div class="checks"></div>
  <div class="header">
    <img class="smileImg" src="assets/emoticono.jpg" alt="Homenaje" />
    <div class="title"><h1>ANDANADA 12</h1><p>San Fermín · <span class="v">V10.1</span></p></div>
    <button class="refresh" id="refreshBtn">Actualizar</button>
  </div>
  <div class="searchRow"><input id="search" class="search" placeholder="Buscar evento, aviso, comida..." /><div class="stamp" id="stamp">Sin actualizar</div></div>
  <nav class="tabs" id="tabs"></nav>
</header>
<main class="content" id="view"></main>
</div>
<nav class="bottom"><div class="bottom-inner" id="bottom"></div></nav>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><div class="modal-title" id="modalTitle"></div><button class="close" onclick="closeModal()">Cerrar</button></div><div class="modal-body" id="modalBody"></div></div></div>
<script>
const SHEET_ID='1XsUj8jiH8qNgx9-aQV7ptv4uStep6Eo7cMogi9IFZ7g';
const SHEET_NAME='Hoja1';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
const tabs=['Inicio','Calendario','Última Hora','Avisos','Fotos','Momenticos','Utilidades','Datos'];
const bottomTabs=['Inicio','Calendario','Última Hora','Avisos','Fotos'];
const tabIcons={Inicio:'🏠',Calendario:'📅',Avisos:'📢',Fotos:'📸','Última Hora':'🚨',Momenticos:'✨',Utilidades:'🧭',Datos:'⚙️'};
let active='Inicio', data=[], filtered=[], q='', lastUpdate=null;
const $=id=>document.getElementById(id);
function norm(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s_\-]+/g,' ')}
function val(r,...keys){for(const k of keys){const nk=norm(k);for(const kk in r){if(norm(kk)===nk && r[kk]!=null && String(r[kk]).trim()!=='')return String(r[kk]).trim()}}return''}
function parseCSV(text){const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'){if(q&&n==='"'){cur+='"';i++}else q=!q}else if(c===','&&!q){row.push(cur);cur=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);row=[];cur=''}else cur+=c}row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);return rows}
function rowsToObjects(rows){const headers=(rows.shift()||[]).map(h=>String(h||'').trim());return rows.map(arr=>{const o={};headers.forEach((h,i)=>o[h||`COL${i}`]=arr[i]||'');return o})}
function day(r){return val(r,'DIA','DÍA','DAY')}
function cat(r){return val(r,'CATEGORIA','CATEGORÍA','EVENTO','TIPO')}
function hour(r){return val(r,'HORA','TIME')}
function title(r){return val(r,'TITULO','TÍTULO','NOMBRE')||cat(r)||'Sin título'}
function subtitle(r){return val(r,'SUBTITULO','SUBTÍTULO','RESUMEN')}
function detail(r){return val(r,'DETALLE','DESCRIPCION','DESCRIPCIÓN','COMENTARIO','MOTIVO','NOTA')}
function locationText(r){return val(r,'UBICACION','UBICACIÓN','LUGAR','MAPA')}
function link(r){return val(r,'ENLACE','LINK','URL')}
function image(r){return driveImg(val(r,'IMAGEN','FOTO','IMG','IMAGE'))}
function rating(r){return val(r,'PUNTUACION','PUNTUACIÓN','RATING','ESTRELLAS')}
function parseDay(d){const m=String(d||'').match(/\d+/);return m?Number(m[0]):99}
function parseHour(h){h=String(h||'').replace('.',':').trim();const m=h.match(/(\d{1,2})(?::(\d{1,2}))?/);if(!m)return 9999;return Number(m[1])*60+Number(m[2]||0)}
function fmtHour(h){h=String(h||'').replace('.',':').trim();const m=h.match(/(\d{1,2})(?::(\d{1,2}))?/);if(!m)return'';return `${m[1].padStart(2,'0')}:${(m[2]||'00').padStart(2,'0')}`}
function sortData(arr){return [...arr].sort((a,b)=>parseDay(day(a))-parseDay(day(b))||parseHour(hour(a))-parseHour(hour(b))||title(a).localeCompare(title(b),'es'))}
function isCat(r,words){const c=norm(cat(r));return words.some(w=>c.includes(norm(w)))}
function urgentRows(){return sortData(data).filter(r=>isCat(r,['ULTIMA HORA','ÚLTIMA HORA','URGENTE']))}
function noticeRows(){return sortData(data).filter(r=>isCat(r,['AVISO','ULTIMA HORA','ÚLTIMA HORA','URGENTE']))}
function photoRows(){return sortData(data).filter(r=>image(r)||isCat(r,['FOTO','FOTOS','GALERIA','GALERÍA']))}
function momentRows(){return sortData(data).filter(r=>isCat(r,['MOMENTICO','MOMENTICOS','MOMENTOS']))}
function barRows(kind){return sortData(data).filter(r=>{const c=norm(cat(r)+' '+title(r)+' '+subtitle(r)); if(kind==='good') return c.includes('REPETIR') || c.includes('BAR OK') || c.includes('BAR BUENO'); return c.includes('NO VOLVER') || c.includes('NO REPETIR') || c.includes('BAR MALO')})}
function eventRows(){return sortData(filtered.length||q?filtered:data).filter(r=>!isCat(r,['UBICACION','UBICACIÓN','LOCALIZACION','LOCALIZACIÓN','BAR REPETIR','BAR NO VOLVER','MOMENTICO','MOMENTICOS']))}
function applySearch(){const s=norm(q);filtered=!s?[]:data.filter(r=>norm(Object.values(r).join(' ')).includes(s))}
function iconFor(r){const c=norm(cat(r)+' '+title(r));if(c.includes('ULTIMA')||c.includes('URGENTE'))return'🚨';if(c.includes('AVISO'))return'📢';if(c.includes('COMIDA')||c.includes('ALMUERZO')||c.includes('CENA'))return'🍽️';if(c.includes('ENCIERRO')||c.includes('TORO')||c.includes('CORRIDA'))return'🐂';if(c.includes('FOTO'))return'📸';if(c.includes('PEÑA')||c.includes('BRONCE'))return'🍻';if(c.includes('BAR'))return'🍻';if(c.includes('MOMENT'))return'✨';if(c.includes('BUS')||c.includes('VILLAVESA'))return'🚌';return'🔹'}
function driveImg(u){u=String(u||'').trim();if(!u)return'';const m=u.match(/drive\.google\.com\/file\/d\/([^/]+)/)||u.match(/[?&]id=([^&]+)/);if(m)return`https://drive.google.com/uc?export=view&id=${m[1]}`;return u}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function openInfo(i){const r=data[i];if(!r)return;const img=image(r);$('modalTitle').textContent=title(r);$('modalBody').innerHTML=`${img?`<img class="modal-img" src="${img}" alt="${escapeHtml(title(r))}">`:''}<div class="meta">${day(r)?`<span class="chip">Día ${escapeHtml(day(r))}</span>`:''}${cat(r)?`<span class="chip red">${escapeHtml(cat(r))}</span>`:''}${hour(r)?`<span class="chip">${fmtHour(hour(r))}</span>`:''}</div>${subtitle(r)?`<p class="sub">${escapeHtml(subtitle(r))}</p>`:''}${detail(r)?`<p class="desc">${escapeHtml(detail(r))}</p>`:''}${locationText(r)?`<p class="desc"><b>📍 Ubicación:</b> ${escapeHtml(locationText(r))}</p>`:''}<div class="btnrow">${link(r)?`<a class="miniBtn" target="_blank" href="${escapeHtml(link(r))}">Abrir enlace</a>`:''}${locationText(r)&&/^https?:/.test(locationText(r))?`<a class="miniBtn light" target="_blank" href="${escapeHtml(locationText(r))}">Abrir mapa</a>`:''}</div>`;$('modal').classList.add('open')}
function closeModal(){$('modal').classList.remove('open')}
function card(r,extra=''){const i=data.indexOf(r);const img=image(r);const isUrg=isCat(r,['ULTIMA HORA','ÚLTIMA HORA','URGENTE']);return `<article class="card ${isUrg?'urgent':''} ${extra}"><div class="event"><div class="icon">${iconFor(r)}</div><div><h3>${escapeHtml(title(r))}</h3><div class="meta">${day(r)?`<span class="chip">Día ${escapeHtml(day(r))}</span>`:''}${cat(r)?`<span class="chip ${isUrg?'':'red'}">${escapeHtml(cat(r))}</span>`:''}${hour(r)?`<span class="chip">${fmtHour(hour(r))}</span>`:''}${rating(r)?`<span class="chip amber">${'⭐'.repeat(Math.min(5,Number(rating(r))||0))||escapeHtml(rating(r))}</span>`:''}</div>${subtitle(r)?`<div class="sub">${escapeHtml(subtitle(r))}</div>`:''}${detail(r)?`<div class="desc">${escapeHtml(detail(r))}</div>`:''}${img?`<img class="event-img" src="${img}" alt="${escapeHtml(title(r))}" onclick="openInfo(${i})">`:''}<div class="btnrow">${(detail(r)||img||link(r)||locationText(r))?`<button class="miniBtn" onclick="openInfo(${i})">Ver información</button>`:''}${link(r)?`<a class="miniBtn light" target="_blank" href="${escapeHtml(link(r))}">Abrir enlace</a>`:''}</div></div></div></article>`}
function renderTabs(){ $('tabs').innerHTML=tabs.map(t=>`<button class="tab ${active===t?'active':''}" onclick="setTab('${t}')">${tabIcons[t]||''} ${t}</button>`).join(''); $('bottom').innerHTML=bottomTabs.map(t=>`<button class="navBtn ${active===t?'active':''}" onclick="setTab('${t}')"><span class="nicon">${tabIcons[t]}</span>${t}</button>`).join('')}
function setTab(t){active=t;render()}
function urgentBlock(){const u=urgentRows()[0];return u?`<div class="noticePill">🚨 Última Hora activa</div>${card(u)}`:''}
function homeView(){const rows=eventRows().filter(r=>!isCat(r,['AVISO','FOTO'])).slice(0,5);return `${urgentBlock()}<h2 class="section-title">Próximos eventos</h2>${rows.length?rows.map(card).join(''):'<div class="empty">Añade eventos en Google Sheets.</div>'}<h2 class="section-title">Accesos rápidos</h2><div class="grid"><button class="quick" onclick="setTab('Calendario')"><span>📅</span>Calendario</button><button class="quick" onclick="setTab('Avisos')"><span>📢</span>Avisos</button><button class="quick" onclick="setTab('Última Hora')"><span>🚨</span>Última Hora</button><button class="quick" onclick="setTab('Momenticos')"><span>✨</span>Momenticos</button><button class="quick" onclick="setTab('Fotos')"><span>📸</span>Fotos</button><button class="quick" onclick="setTab('Utilidades')"><span>🧭</span>Utilidades</button></div>`}
function calendarView(){const rows=eventRows();if(!rows.length)return'<div class="empty">No hay eventos.</div>';let html='';let last='';for(const r of rows){const d=day(r)||'Sin día';if(d!==last){html+=`<div class="dayHeader">Día ${escapeHtml(d)}</div>`;last=d}html+=card(r)}return html}
function avisosView(){const rows=noticeRows();return `${urgentBlock()}<h2 class="section-title">Avisos</h2>${rows.length?rows.map(card).join(''):'<div class="empty">No hay avisos.</div>'}`}
function fotosView(){const rows=photoRows();return `<h2 class="section-title">Fotos</h2>${rows.length?`<div class="photoGrid">${rows.map(r=>`<img src="${image(r)}" alt="${escapeHtml(title(r))}" onclick="openInfo(${data.indexOf(r)})">`).join('')}</div>`:'<div class="empty">Añade enlaces de imagen en la columna IMAGEN.</div>'}`}
function ultimaHoraView(){const rows=urgentRows();return `<h2 class="section-title">🚨 Última Hora</h2>${rows.length?rows.map(r=>card(r)).join(''):'<div class="empty">Para activar un mensaje urgente, añade una fila con categoría ULTIMA HORA.</div>'}`}
function momenticosView(){const rows=momentRows();return `<h2 class="section-title">✨ Momenticos</h2>${rows.length?rows.map(r=>card(r,'moment')).join(''):'<div class="empty">Categoría: MOMENTICO.</div>'}`}
function utilidadesView(){const util=[['🍻','Dónde está la Peña','PENA'],['👥','Dónde está la cuadrilla','CUADRILLA'],['🚌','Villavesas','VILLAVESA'],['🚕','Taxis Pamplona','TAXI'],['🅿️','Parkings','PARKING'],['🚑','Emergencias','EMERGENCIA']];return `<h2 class="section-title">Utilidades</h2><div class="grid">${util.map(([ic,txt,key])=>{const r=data.find(x=>norm(cat(x)+' '+title(x)).includes(norm(key)));const url=r&&(link(r)||locationText(r));return `<a class="quick" ${url?`href="${escapeHtml(url)}" target="_blank"`:`onclick="alert('Añade una fila de categoría ${key} con ENLACE o UBICACION')"`}><span>${ic}</span>${txt}</a>`}).join('')}</div>`}
function datosView(){return `<h2 class="section-title">Datos</h2><div class="card"><p class="desc"><b>Filas cargadas:</b> ${data.length}<br><b>Última actualización:</b> ${lastUpdate?lastUpdate.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'No actualizada'}<br><b>Hoja:</b> Google Sheets · Andanada 12</p><button class="miniBtn" onclick="loadData(true)">Actualizar datos</button></div><h2 class="section-title">Categorías nuevas V10</h2><div class="card"><p class="desc"><b>ULTIMA HORA</b> · aparece arriba destacada y en su pestaña.<br><b>MOMENTICO</b> · aparece en Momenticos.</p></div><pre class="debug">Columnas recomendadas:\nDIA | CATEGORIA | HORA | TITULO | SUBTITULO | DETALLE | DESCRIPCION | UBICACION | ENLACE | IMAGEN | PUNTUACION</pre>`}
function render(){applySearch();renderTabs();let html='';if(active==='Inicio')html=homeView();if(active==='Calendario')html=`<h2 class="section-title">Calendario</h2>`+calendarView();if(active==='Avisos')html=avisosView();if(active==='Fotos')html=fotosView();if(active==='Última Hora')html=ultimaHoraView();if(active==='Momenticos')html=momenticosView();if(active==='Utilidades')html=utilidadesView();if(active==='Datos')html=datosView();$('view').innerHTML=html}
async function loadData(force=false){$('stamp').textContent='Actualizando...';try{const res=await fetch(CSV_URL+(force?`&cachebust=${Date.now()}`:''),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);const text=await res.text();data=rowsToObjects(parseCSV(text));lastUpdate=new Date();$('stamp').textContent='Actualizado '+lastUpdate.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});render()}catch(e){$('stamp').textContent='Error';$('view').innerHTML=`<div class="card"><h2>Error al cargar</h2><p class="desc">${escapeHtml(e.message)}<br>Comprueba que Google Sheets esté compartido como “Cualquier persona con el enlace: lector”.</p></div>`}}
$('refreshBtn').onclick=()=>loadData(true);$('search').oninput=e=>{q=e.target.value;render()};renderTabs();loadData();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>

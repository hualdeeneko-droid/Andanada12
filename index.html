<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Andanada 12</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c9161d" />
  <style>
    :root{
      --red:#c9161d; --red2:#e31c23; --blue:#0d4f93; --navy:#10264b; --soft:#f5f7fb; --text:#172033; --muted:#6b7280; --card:#ffffff; --line:#e8edf5;
      --shadow:0 18px 38px rgba(16,38,75,.13);
      --radius:26px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(#fff,#f4f6fb);color:var(--text)}
    .app{max-width:920px;margin:auto;min-height:100vh;padding-bottom:90px}.hero{position:relative;color:white;padding:28px 24px 28px;background:linear-gradient(135deg,#d3171e,#b70f18);overflow:hidden}.hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(45deg,rgba(255,255,255,.22) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.22) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.22) 75%),linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.22) 75%);background-size:42px 42px;background-position:0 0,0 21px,21px -21px,-21px 0;opacity:.18}.hero-inner{position:relative;display:flex;align-items:flex-start;gap:18px}.hero-title{flex:1}.brand{font-size:clamp(42px,9vw,76px);font-weight:1000;letter-spacing:.5px;line-height:.92;margin:0;text-transform:uppercase}.sub{font-size:20px;font-weight:800;margin:10px 0 0;opacity:.95}.smile{width:84px;height:84px;border-radius:50%;background:white;border:4px solid white;object-fit:cover;box-shadow:0 12px 24px rgba(0,0,0,.18);flex:0 0 auto}.checker{height:26px;border-radius:18px;background-color:white;background-image:linear-gradient(45deg,rgba(13,79,147,.92) 25%,transparent 25%),linear-gradient(-45deg,rgba(13,79,147,.92) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(13,79,147,.92) 75%),linear-gradient(-45deg,transparent 75%,rgba(13,79,147,.92) 75%);background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0;margin:22px 0 0;box-shadow:inset 0 0 0 2px rgba(255,255,255,.8)}
    .top-actions{position:relative;margin:-22px 24px 18px;display:flex;gap:12px;align-items:center;z-index:3}.btn{appearance:none;border:0;border-radius:999px;background:white;color:var(--red);font-weight:1000;font-size:16px;padding:14px 20px;box-shadow:var(--shadow);cursor:pointer}.btn.primary{background:var(--red);color:white}.btn.blue{background:var(--blue);color:white}.btn.ghost{background:#edf4ff;color:var(--blue);box-shadow:none}.status{font-size:13px;color:var(--muted);font-weight:700;margin-left:auto}.tabs{display:flex;gap:10px;overflow:auto;padding:10px 22px 20px}.tab{white-space:nowrap;border:0;border-radius:999px;padding:13px 18px;background:white;color:#172033;font-weight:1000;box-shadow:0 10px 22px rgba(16,38,75,.08)}.tab.active{background:var(--red);color:white}.content{padding:0 22px}.section-title{display:flex;align-items:center;gap:10px;margin:18px 0 12px;color:var(--navy);font-size:28px;font-weight:1000;text-transform:uppercase}.section-title .red{color:var(--red)}.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin:14px 0;border-left:8px solid var(--red);overflow:hidden}.card.compact{padding:0}.event-head{display:flex;gap:14px;align-items:flex-start}.icon{font-size:28px;width:38px;text-align:center}.event-main{flex:1;min-width:0}.title{font-size:28px;font-weight:1000;line-height:1.05;margin:0 0 12px;text-transform:uppercase;color:#1c2638}.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.pill{background:#eaf3ff;color:var(--blue);font-weight:1000;border-radius:999px;padding:8px 12px;font-size:15px}.pill.red{background:#ffe9eb;color:#a60d14}.summary{font-size:20px;line-height:1.3;margin:7px 0;color:#253044;font-weight:650}.detail-short{font-size:18px;color:#3c4657;line-height:1.35;white-space:pre-line}.event-img{display:block;width:100%;max-height:360px;object-fit:cover;border-radius:20px;margin:14px 0 6px;border:1px solid var(--line);background:#f3f3f3}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.mini-list{background:white;border-radius:24px;box-shadow:var(--shadow);overflow:hidden}.mini-row{display:grid;grid-template-columns:74px 46px 1fr 24px;gap:12px;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}.mini-row:last-child{border-bottom:0}.time{font-size:20px;font-weight:1000;color:var(--blue)}.mini-title{font-size:21px;font-weight:1000;text-transform:uppercase}.mini-sub{font-size:16px;color:#38465a}.notice{border-left-color:#ffb000}.notice .title{color:#a60d14}.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.quick{border:2px solid rgba(13,79,147,.25);border-radius:24px;background:white;box-shadow:0 8px 20px rgba(16,38,75,.08);padding:20px 10px;text-align:center;font-weight:1000;color:var(--navy);min-height:116px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}.quick::before{content:"";position:absolute}.quick span:first-child{font-size:34px}.quick.check{background-image:linear-gradient(45deg,rgba(13,79,147,.14) 25%,transparent 25%),linear-gradient(-45deg,rgba(13,79,147,.14) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(13,79,147,.14) 75%),linear-gradient(-45deg,transparent 75%,rgba(13,79,147,.14) 75%);background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}.day-filters{display:flex;gap:8px;overflow:auto;padding:4px 0 12px}.day-btn{border:0;border-radius:999px;background:white;color:var(--navy);font-weight:1000;padding:10px 16px;box-shadow:0 7px 17px rgba(16,38,75,.08)}.day-btn.active{background:var(--red);color:white}.search{width:100%;border:2px solid #dfe7f4;border-radius:18px;padding:14px 16px;font-size:17px;font-weight:700;margin:4px 0 12px}.empty{text-align:center;color:var(--muted);font-size:20px;padding:50px 20px}.footer-nav{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0b2450,#0a3b75);height:76px;display:flex;justify-content:center;gap:0;z-index:9;box-shadow:0 -10px 30px rgba(0,0,0,.18)}.footer-nav .navbtn{width:min(20%,170px);border:0;background:transparent;color:white;font-weight:900;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.footer-nav .navbtn.active{color:#ff2b31}.footer-nav .navbtn span{font-size:24px}.modal{position:fixed;inset:0;background:rgba(8,18,38,.72);display:none;align-items:center;justify-content:center;z-index:99;padding:18px}.modal.open{display:flex}.modal-box{background:white;border-radius:28px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 28px 80px rgba(0,0,0,.34)}.modal-head{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line)}.modal-title{font-size:26px;font-weight:1000;color:var(--navy);flex:1}.close{border:0;background:#f2f5fb;border-radius:999px;width:40px;height:40px;font-size:22px}.modal-body{padding:22px;font-size:18px;line-height:1.45;white-space:pre-line}.modal-img{width:100%;height:auto;display:block;border-radius:0}.small{font-size:14px;color:var(--muted);font-weight:700}.hidden{display:none!important}@media(min-width:720px){.quick-grid{grid-template-columns:repeat(4,1fr)}.hero{border-radius:0 0 30px 30px}.content{padding:0 34px}.tabs{padding-left:34px}.top-actions{margin-left:34px;margin-right:34px}.mini-row{grid-template-columns:90px 54px 1fr 24px}.brand{font-size:64px}}
  </style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-title"><h1 class="brand">Andanada 12</h1><div class="sub">San Fermín · Peña Los de Bronce · Cuadrilla</div></div>
      <img class="smile" src="assets/emoticono.jpg" alt="Homenaje" />
    </div>
    <div class="checker"></div>
  </header>
  <div class="top-actions"><button class="btn" id="refreshBtn">Actualizar</button><span class="status" id="status">Datos desde Google Sheets</span></div>
  <nav class="tabs" id="tabs"></nav>
  <main class="content" id="view"></main>
</div>
<nav class="footer-nav" id="footer"></nav>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><div class="modal-title" id="modalTitle"></div><button class="close" onclick="closeModal()">×</button></div><div class="modal-body" id="modalBody"></div></div></div>
<script>
const SHEET_ID='1XsUj8jiH8qNgx9-aQV7ptv4uStep6Eo7cMogi9IFZ7g';
const SHEET_NAME='Hoja1';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
const tabs=['Inicio','Calendario','Avisos','Fotos','Utilidades','Datos'];
let active='Inicio', data=[], filterDay='Todos', q='';
const tabIcons={Inicio:'🏠',Calendario:'📅',Avisos:'📢',Fotos:'📷',Utilidades:'🚌',Datos:'⚙️'};
function normKey(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}
function val(r,...ks){for(const k of ks){const nk=normKey(k); if(r[nk]!=null && String(r[nk]).trim()!=='') return String(r[nk]).trim()} return ''}
function csvParse(text){const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'){if(q&&n==='"'){cur+='"';i++}else q=!q}else if(c===','&&!q){row.push(cur);cur=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);row=[];cur=''}else cur+=c}row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);return rows}
function rowsToObjects(rows){const headers=(rows.shift()||[]).map(normKey);return rows.map(arr=>{const o={};headers.forEach((h,i)=>o[h]=arr[i]||'');return o}).filter(o=>Object.values(o).some(v=>String(v).trim()))}
function parseHour(h){h=String(h||'').trim().replace('.',':').replace(',',':'); const m=h.match(/(\d{1,2})(?::(\d{1,2}))?/); if(!m)return 9999; return (+m[1])*60+(+(m[2]||0))}
function parseDay(d){const m=String(d||'').match(/\d+/);return m?+m[0]:99}
function formatHour(h){h=String(h||'').trim().replace('.',':').replace(',',':');const m=h.match(/^(\d{1,2})(?::(\d{1,2}))?$/);if(!m)return h;return `${String(+m[1]).padStart(2,'0')}:${String(+(m[2]||0)).padStart(2,'0')}`}
function cat(r){return val(r,'CATEGORIA','EVENTO','TIPO')}
function title(r){return val(r,'TITULO','TÍTULO') || cat(r)}
function day(r){return val(r,'DIA','DÍA')}
function hour(r){return val(r,'HORA')}
function subtitle(r){return val(r,'SUBTITULO','SUBTÍTULO')}
function detalle(r){return val(r,'DETALLE','RESUMEN')}
function desc(r){return val(r,'DESCRIPCION','DESCRIPCIÓN','INFO')}
function enlace(r){return val(r,'ENLACE','LINK','URL')}
function ubicacion(r){return val(r,'UBICACION','UBICACIÓN','MAPS','MAPA')}
function imagen(r){return val(r,'IMAGEN','FOTO','IMAGE')}
function isURL(s){return /^https?:\/\//i.test(String(s||''))}
function driveImg(url){url=String(url||'').trim(); if(!url)return ''; let id=''; let m=url.match(/\/file\/d\/([^/]+)/); if(m) id=m[1]; m=url.match(/[?&]id=([^&]+)/); if(m) id=m[1]; if(id) return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`; return url}
function iconFor(c){c=normKey(c); if(c.includes('ENCIERRO'))return '🐂'; if(c.includes('CORRIDA')||c.includes('TORO'))return '🎟️'; if(c.includes('GIGANTE'))return '👑'; if(c.includes('PENA')||c.includes('PEÑA'))return '🎺'; if(c.includes('COMIDA')||c.includes('ALMUERZO')||c.includes('CENA'))return '🍽️'; if(c.includes('AVISO'))return '📢'; if(c.includes('FOTO'))return '🖼️'; if(c.includes('UBIC'))return '📍'; return '🔹'}
function sortData(arr){return [...arr].sort((a,b)=>parseDay(day(a))-parseDay(day(b)) || parseHour(hour(a))-parseHour(hour(b)) || title(a).localeCompare(title(b),'es'))}
function nonUtilityRows(){return sortData(data).filter(r=>!normKey(cat(r)).includes('UBICACION'))}
function avisoRows(){return sortData(data).filter(r=>normKey(cat(r)).includes('AVISO'))}
function fotoRows(){return sortData(data).filter(r=>normKey(cat(r)).includes('FOTO') || imagen(r))}
function locationRow(name){const n=normKey(name);return data.find(r=>normKey(cat(r)).includes('UBICACION') && normKey(title(r)).includes(n)) || data.find(r=>normKey(title(r)).includes(n) && (isURL(enlace(r))||isURL(ubicacion(r))))}
function locationLink(name){const r=locationRow(name); if(!r)return ''; return isURL(enlace(r))?enlace(r):(isURL(ubicacion(r))?ubicacion(r):'')}
function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${active===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');document.getElementById('footer').innerHTML=['Inicio','Calendario','Utilidades','Avisos','Fotos'].map(t=>`<button class="navbtn ${active===t?'active':''}" onclick="setTab('${t}')"><span>${tabIcons[t]}</span>${t}</button>`).join('')}
function setTab(t){active=t;render()}
function render(){renderTabs();const v=document.getElementById('view'); if(active==='Inicio') v.innerHTML=homeView(); if(active==='Calendario') v.innerHTML=calendarView(); if(active==='Avisos') v.innerHTML=avisosView(); if(active==='Fotos') v.innerHTML=fotosView(); if(active==='Utilidades') v.innerHTML=utilView(); if(active==='Datos') v.innerHTML=datosView()}
function homeView(){const rows=nonUtilityRows(); const next=rows.filter(r=>parseDay(day(r))>=6).slice(0,4); const aviso=avisoRows()[0];return `${aviso?noticeCard(aviso):''}<div class="section-title">Hoy <span class="red">· San Fermín</span></div><div class="mini-list">${next.map(miniRow).join('')||'<div class="empty">Añade eventos en Google Sheets.</div>'}</div><div class="section-title">Accesos rápidos</div><div class="quick-grid">${quick('📅','Calendario','Calendario')}${quick('📢','Avisos','Avisos')}${quick('👥','¿Dónde está la cuadrilla?',null,locationLink('CUADRILLA'))}${quick('📍','Mapa de la Peña',null,locationLink('PEÑA'))}${quick('🚌','Utilidades','Utilidades')}${quick('🍽️','Comidas','Calendario','COMIDA')}${quick('📷','Fotos','Fotos')}${quick('🌦️','El tiempo',null,'https://www.aemet.es/es/eltiempo/prediccion/municipios/pamplona-iruna-id31201')}</div>`}
function quick(ic,txt,tab,linkOrFilter){if(linkOrFilter&&isURL(linkOrFilter))return `<button class="quick check" onclick="openLink('${linkOrFilter}')"><span>${ic}</span><b>${txt}</b></button>`; if(tab)return `<button class="quick check" onclick="${linkOrFilter?`q='${linkOrFilter}';`:''}setTab('${tab}')"><span>${ic}</span><b>${txt}</b></button>`; return `<button class="quick check"><span>${ic}</span><b>${txt}</b></button>`}
function miniRow(r){return `<div class="mini-row" onclick="openInfo(${data.indexOf(r)})"><div class="time">${formatHour(hour(r))||'—'}</div><div class="icon">${iconFor(cat(r))}</div><div><div class="mini-title">${esc(title(r))}</div><div class="mini-sub">${esc(subtitle(r)||detalle(r)||cat(r))}</div></div><div>›</div></div>`}
function eventCard(r){const img=driveImg(imagen(r)); const i=data.indexOf(r); return `<article class="card"><div class="event-head"><div class="icon">${iconFor(cat(r))}</div><div class="event-main"><h2 class="title">${esc(title(r))}</h2><div class="pills"><span class="pill">Día ${esc(day(r)||'—')}</span><span class="pill red">${esc(cat(r)||'Evento')}</span>${hour(r)?`<span class="pill">${esc(formatHour(hour(r)))}</span>`:''}</div>${subtitle(r)?`<div class="summary">${esc(subtitle(r))}</div>`:''}${detalle(r)?`<div class="detail-short">${esc(detalle(r))}</div>`:''}${img?`<img class="event-img" src="${img}" onclick="openImage('${img.replace(/'/g,'%27')}','${escAttr(title(r))}')" loading="lazy" />`:''}<div class="actions">${desc(r)?`<button class="btn blue" onclick="openInfo(${i})">Ver información</button>`:''}${isURL(enlace(r))?`<button class="btn ghost" onclick="openLink('${enlace(r)}')">Abrir enlace</button>`:''}${isURL(ubicacion(r))?`<button class="btn ghost" onclick="openLink('${ubicacion(r)}')">📍 Ubicación</button>`:''}</div></div></div></article>`}
function noticeCard(r){return `<article class="card notice"><div class="event-head"><div class="icon">📢</div><div class="event-main"><h2 class="title">${esc(title(r))}</h2>${detalle(r)?`<div class="detail-short">${esc(detalle(r))}</div>`:''}${desc(r)?`<div class="actions"><button class="btn blue" onclick="openInfo(${data.indexOf(r)})">Ver más</button></div>`:''}</div></div></article>`}
function filteredRows(){let rows=nonUtilityRows(); if(active==='Avisos')rows=avisoRows(); if(active==='Fotos')rows=fotoRows(); if(filterDay!=='Todos') rows=rows.filter(r=>String(parseDay(day(r)))===String(filterDay)); if(q) rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(q.toLowerCase())); return rows}
function calendarView(){const days=['Todos',6,7,8,9,10,11,12,13,14]; return `<input class="search" placeholder="Buscar evento, torero, ganadería..." value="${escAttr(q)}" oninput="q=this.value;render()"><div class="day-filters">${days.map(d=>`<button class="day-btn ${filterDay===d?'active':''}" onclick="filterDay='${d}';render()">${d==='Todos'?'Todos':'Día '+d}</button>`).join('')}</div>${filteredRows().map(eventCard).join('')||'<div class="empty">No hay eventos.</div>'}`}
function avisosView(){return `${avisoRows().map(noticeCard).join('')||'<div class="empty">No hay avisos todavía.</div>'}`}
function fotosView(){const rows=fotoRows();return `${rows.map(eventCard).join('')||'<div class="empty">Añade una fila con CATEGORIA = FOTO o una columna IMAGEN.</div>'}`}
function utilView(){const pe=locationLink('PEÑA'), cu=locationLink('CUADRILLA');return `<div class="section-title">Ubicaciones</div><div class="quick-grid">${quick('🍻','Dónde está la Peña',null,pe)}${quick('👥','Dónde está la cuadrilla',null,cu)}${quick('🚌','Villavesas',null,'https://www.infotuc.es/')}${quick('🚕','Taxis Pamplona',null,'https://teletaxisanfermin.com/')}${quick('🅿️','Parkings',null,'https://www.pamplona.es/temas/movilidad-y-transporte/aparcamientos')}${quick('🚑','Emergencias 112',null,'tel:112')}${quick('👮','Policía Municipal',null,'tel:092')}${quick('💊','Farmacias',null,'https://www.cof-navarra.com/farmacias-de-guardia/')}</div><div class="small" style="margin:20px 4px">Las ubicaciones de Peña y Cuadrilla se leen desde Google Sheets: CATEGORIA=UBICACION, TITULO=PEÑA o CUADRILLA, ENLACE=Google Maps.</div>`}
function datosView(){return `<article class="card"><h2 class="title">Datos</h2><p>La app lee la hoja pública de Google Sheets.</p><p class="small">Columnas recomendadas:</p><pre style="white-space:pre-wrap;background:#f3f6fb;padding:14px;border-radius:14px">DIA | CATEGORIA | HORA | TITULO | SUBTITULO | DETALLE | DESCRIPCION | UBICACION | ENLACE | IMAGEN</pre><button class="btn blue" onclick="loadData()">Actualizar datos</button></article>`}
function openInfo(i){const r=data[i]; if(!r)return; const img=driveImg(imagen(r)); document.getElementById('modalTitle').textContent=title(r); document.getElementById('modalBody').innerHTML=`${img?`<img class="modal-img" src="${img}">`:''}<div>${esc(desc(r)||detalle(r)||subtitle(r)||'Sin descripción ampliada.')}</div>${isURL(enlace(r))?`<p><button class="btn blue" onclick="openLink('${enlace(r)}')">Abrir enlace</button></p>`:''}${isURL(ubicacion(r))?`<p><button class="btn blue" onclick="openLink('${ubicacion(r)}')">Abrir ubicación</button></p>`:''}`;document.getElementById('modal').classList.add('open')}
function openImage(src,t){document.getElementById('modalTitle').textContent=t||'Imagen';document.getElementById('modalBody').innerHTML=`<img class="modal-img" src="${src}">`;document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function openLink(u){ if(u) window.open(u,'_blank') }
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function escAttr(s){return esc(s).replace(/"/g,'&quot;')}
async function loadData(){const st=document.getElementById('status'); st.textContent='Actualizando...'; try{const res=await fetch(CSV_URL+'&_=' + Date.now()); if(!res.ok) throw new Error('No se pudo leer Google Sheets'); const txt=await res.text(); data=sortData(rowsToObjects(csvParse(txt))); localStorage.setItem('andanada12-cache',JSON.stringify(data)); st.textContent=`Actualizado · ${data.length} filas`; render()}catch(e){st.textContent='Error al cargar'; const cached=localStorage.getItem('andanada12-cache'); if(cached){data=JSON.parse(cached);render()}else{document.getElementById('view').innerHTML=`<article class="card notice"><h2 class="title">Error al cargar</h2><p>${esc(e.message)}</p><p>Comprueba que Google Sheets esté compartido como “Cualquier persona con el enlace: Lector”.</p></article>`}}}
document.getElementById('refreshBtn').onclick=loadData;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});loadData();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>

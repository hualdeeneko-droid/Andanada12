<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Andanada 12 · V9</title>
<meta name="theme-color" content="#d71920">
<style>
:root{
  --red:#d71920; --red2:#b71218; --blue:#0b4ea2; --blue2:#08366f; --ink:#121826; --muted:#667085; --bg:#f7f7fb; --card:#ffffff; --line:#e7e8ef; --amber:#ffb703;
}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fff 0,#f6f7fb 42%,#edf2ff 100%);color:var(--ink)}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:92px}
.hero{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.checks{height:18px;background-color:#fff;background-image:linear-gradient(45deg,var(--blue) 25%,transparent 25%),linear-gradient(-45deg,var(--blue) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,var(--blue) 75%),linear-gradient(-45deg,transparent 75%,var(--blue) 75%);background-size:18px 18px;background-position:0 0,0 9px,9px -9px,-9px 0;opacity:.95}
.hero-inner{padding:14px 16px 12px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.brand{display:flex;align-items:center;gap:10px} .brand h1{font-size:25px;line-height:1;margin:0;letter-spacing:.4px;color:var(--red)} .brand small{display:block;color:var(--muted);font-weight:700;margin-top:3px}
.tribute{width:48px;height:48px;border-radius:50%;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,.14);border:3px solid white}
.actions{display:flex;gap:8px;align-items:center;grid-column:1/-1} button,.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;justify-content:center}
.primary{background:var(--red);color:white;box-shadow:0 8px 18px rgba(215,25,32,.24)} .ghost{background:#f0f3fa;color:var(--blue2)} .smallbtn{padding:8px 10px;border-radius:11px;font-size:13px}
.search{flex:1;border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px 13px;font-size:15px;min-width:0}
.tabs{display:flex;gap:8px;overflow:auto;padding:8px 12px 12px} .tab{white-space:nowrap;background:#eef3ff;color:var(--blue2);border:1px solid #dbe7ff;padding:9px 12px;border-radius:999px;font-size:14px} .tab.active{background:var(--blue);color:#fff}
main{padding:14px 14px 0} .panel{display:none} .panel.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:15px;margin:12px 0;box-shadow:0 10px 25px rgba(16,24,40,.06);overflow:hidden}
.card.urgent{border-color:#ffcccf;background:linear-gradient(180deg,#fff6f6,#fff);box-shadow:0 12px 28px rgba(215,25,32,.12)} .urgent-title{display:flex;align-items:center;gap:8px;color:var(--red);font-size:16px;font-weight:950;letter-spacing:.4px}
.section-title{font-size:18px;margin:18px 2px 8px;font-weight:950;color:var(--blue2)}
.event-head{display:flex;gap:11px;align-items:flex-start} .badge{min-width:44px;height:44px;border-radius:15px;background:#eef3ff;display:grid;place-items:center;font-size:23px;color:var(--blue)}
.event-title{font-size:17px;font-weight:950;margin:0 0 4px;text-transform:uppercase} .meta{color:var(--muted);font-size:13px;font-weight:800;display:flex;gap:7px;flex-wrap:wrap} .subtitle{font-weight:850;margin:8px 0 3px;color:#26314d} .detail{color:#39435e;white-space:pre-wrap;margin:5px 0 0;line-height:1.38}
.event-img{width:100%;border-radius:16px;margin-top:12px;display:block;max-height:360px;object-fit:cover;border:1px solid var(--line);cursor:pointer;background:#f1f1f1}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px} .linkbtn{background:#eef3ff;color:var(--blue2)} .infobtn{background:#fff2f2;color:var(--red2);border:1px solid #ffd6d8}
.daybar{display:flex;gap:8px;overflow:auto;margin:6px -2px 8px;padding:2px} .day{min-width:48px;text-align:center;border:1px solid #dce5fb;background:white;color:var(--blue2);border-radius:16px;padding:8px 9px;font-weight:950} .day.active{background:var(--red);color:white;border-color:var(--red)}
.utility-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px} .util{background:white;border:1px solid var(--line);border-radius:18px;padding:14px;text-decoration:none;color:var(--ink);font-weight:900;box-shadow:0 8px 20px rgba(16,24,40,.05)} .util span{font-size:25px;display:block;margin-bottom:7px}
.empty{text-align:center;color:var(--muted);padding:28px 10px;font-weight:700} .status{font-size:12px;color:var(--muted);font-weight:800}
.modal{position:fixed;inset:0;background:rgba(10,16,28,.62);z-index:50;display:none;align-items:center;justify-content:center;padding:18px} .modal.show{display:flex} .modal-card{background:white;border-radius:24px;max-width:680px;width:100%;max-height:88vh;overflow:auto;padding:18px;box-shadow:0 22px 60px rgba(0,0,0,.32)} .modal-card h2{margin:0 0 8px;color:var(--red)} .modal-text{white-space:pre-wrap;line-height:1.45;color:#25304b} .modal-img{max-width:100%;max-height:78vh;border-radius:18px;display:block;margin:auto}
.close{float:right;background:#f2f4f7;color:#111;padding:8px 11px}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line)} .bottom nav{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:7px 7px calc(7px + env(safe-area-inset-bottom))} .navbtn{background:transparent;color:#526076;border-radius:14px;padding:8px 2px;font-size:11px;display:grid;gap:2px} .navbtn b{font-size:20px} .navbtn.active{background:#eef3ff;color:var(--blue)}
@media(min-width:720px){.utility-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

<script>
const SHEET_ID = '1XsUj8jiH8qNgx9-aQV7ptv4uStep6Eo7cMogi9IFZ7g';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0&cb=${Date.now()}`;
const TABS = [ ['inicio','🏠','Inicio'], ['calendario','📅','Calendario'], ['avisos','📢','Avisos'], ['fotos','📸','Fotos'], ['utilidades','🧭','Utilidades'], ['datos','⚙️','Datos'] ];
let rows=[], active='inicio', dayFilter='all', query='';
function norm(s){return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toUpperCase();}
function val(r,k){return r[norm(k)] || '';}
function day(r){return parseInt(val(r,'DIA') || val(r,'DÍA') || '0',10)||0;}
function cat(r){return norm(val(r,'CATEGORIA') || val(r,'CATEGORÍA'));}
function hour(r){return val(r,'HORA').trim();}
function title(r){return val(r,'TITULO') || val(r,'TÍTULO') || val(r,'CATEGORIA') || val(r,'CATEGORÍA') || 'Evento';}
function subtitle(r){return val(r,'SUBTITULO') || val(r,'SUBTÍTULO');}
function detail(r){return val(r,'DETALLE');}
function desc(r){return val(r,'DESCRIPCION') || val(r,'DESCRIPCIÓN');}
function loc(r){return val(r,'UBICACION') || val(r,'UBICACIÓN');}
function link(r){return val(r,'ENLACE');}
function image(r){return val(r,'IMAGEN') || val(r,'FOTO');}
function minutes(h){let m=String(h||'').match(/(\d{1,2})[:.](\d{2})/); if(!m) return 9999; return (+m[1])*60+(+m[2]);}
function fmtHour(h){let m=String(h||'').match(/(\d{1,2})[:.](\d{2})/); return m ? `${String(+m[1]).padStart(2,'0')}:${m[2]}` : '';}
function icon(c){c=norm(c); if(c.includes('ULTIMA'))return '🚨'; if(c.includes('AVISO'))return '📢'; if(c.includes('COMIDA'))return '🍽️'; if(c.includes('ALMUERZO'))return '🍷'; if(c.includes('ENCIERRO'))return '🐂'; if(c.includes('CORRIDA')||c.includes('TORO'))return '🎭'; if(c.includes('GIGANTE'))return '👑'; if(c.includes('PEÑA')||c.includes('BRONCE'))return '🎺'; if(c.includes('FOTO'))return '📸'; if(c.includes('UBIC'))return '📍'; return '⭐';}
function driveImg(u){u=String(u||'').trim(); let id=(u.match(/\/d\/([^/]+)/)||u.match(/[?&]id=([^&]+)/)||[])[1]; if(id) return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`; return u;}
function safe(s){return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function matches(r){if(!query) return true; return norm(Object.values(r).join(' ')).includes(norm(query));}
function sorted(list){return [...list].sort((a,b)=>(day(a)-day(b)) || (minutes(hour(a))-minutes(hour(b))) || title(a).localeCompare(title(b),'es'));}
async function loadData(){
  document.getElementById('status').textContent='Cargando…';
  try{
    const res = await fetch(SHEET_URL, {cache:'no-store'}); const txt=await res.text();
    const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
    const cols = json.table.cols.map(c=>norm(c.label || c.id));
    rows = json.table.rows.map(row=>{let o={}; (row.c||[]).forEach((cell,i)=>{ if(cols[i]) o[cols[i]]=cell?String(cell.f ?? cell.v ?? '').trim():''; }); return o;}).filter(r=>Object.values(r).some(Boolean));
    rows=sorted(rows); localStorage.setItem('andanada12_rows', JSON.stringify(rows)); localStorage.setItem('andanada12_updated', new Date().toISOString());
    render();
  }catch(e){ console.error(e); const cached=localStorage.getItem('andanada12_rows'); if(cached){rows=JSON.parse(cached); render('Sin conexión: usando datos guardados');} else {document.getElementById('status').textContent='Error al cargar'; document.getElementById('p-inicio').innerHTML='<div class="card urgent"><b>No se han podido cargar los datos.</b><br>Comprueba que Google Sheets esté compartido como lector.</div>';} }
}
function render(msg){
  const up=localStorage.getItem('andanada12_updated'); document.getElementById('status').textContent = msg || (up ? 'Actualizado '+new Date(up).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : 'Actualizado');
  renderTabs(); renderPanel();
}
function renderTabs(){document.getElementById('topTabs').innerHTML=TABS.map(t=>`<button class="tab ${active==t[0]?'active':''}" onclick="go('${t[0]}')">${t[1]} ${t[2]}</button>`).join('');document.getElementById('bottomNav').innerHTML=TABS.slice(0,5).map(t=>`<button class="navbtn ${active==t[0]?'active':''}" onclick="go('${t[0]}')"><b>${t[1]}</b><span>${t[2]}</span></button>`).join('');}
function go(id){active=id; document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById('p-'+id).classList.add('active'); render(); window.scrollTo({top:0,behavior:'smooth'})}
function eventCard(r){
  const c=cat(r), h=fmtHour(hour(r)), im=driveImg(image(r)), l=link(r)||loc(r);
  return `<article class="card ${c.includes('ULTIMA')?'urgent':''}">
    <div class="event-head"><div class="badge">${icon(c)}</div><div style="flex:1"><h3 class="event-title">${safe(title(r))}</h3><div class="meta">${day(r)?`<span>Día ${day(r)}</span>`:''}${h?`<span>· ${h}</span>`:''}${c?`<span>· ${safe(c)}</span>`:''}</div>${subtitle(r)?`<div class="subtitle">${safe(subtitle(r))}</div>`:''}${detail(r)?`<div class="detail">${safe(detail(r))}</div>`:''}</div></div>
    ${im?`<img class="event-img" src="${safe(im)}" onclick="openImage('${safe(im)}')" loading="lazy" alt="${safe(title(r))}">`:''}
    <div class="row-actions">${desc(r)?`<button class="infobtn" onclick='openInfo(${JSON.stringify(title(r))}, ${JSON.stringify(desc(r))})'>Ver información</button>`:''}${l?`<a class="btn linkbtn" target="_blank" href="${safe(l)}">Abrir enlace</a>`:''}</div>
  </article>`;
}
function filtered(base=rows){return sorted(base.filter(matches));}
function isUrgent(r){return cat(r).includes('ULTIMA') || cat(r).includes('URGENTE');}
function renderPanel(){
  const urg=filtered(rows.filter(isUrgent));
  const regular=filtered(rows.filter(r=>!isUrgent(r) && !cat(r).includes('UBICACION')));
  if(active==='inicio'){
    const next=regular.slice(0,8);
    document.getElementById('p-inicio').innerHTML = `${urg.length?`<div class="urgent-title">🚨 ÚLTIMA HORA</div>${urg.map(eventCard).join('')}`:''}<div class="section-title">Próximos eventos</div>${next.map(eventCard).join('')||'<div class="empty">No hay eventos todavía.</div>'}`;
  }
  if(active==='calendario'){
    const days=[6,7,8,9,10,11,12,13,14]; const base=regular.filter(r=> dayFilter==='all' || day(r)==dayFilter);
    document.getElementById('p-calendario').innerHTML = `<div class="daybar"><button class="day ${dayFilter==='all'?'active':''}" onclick="dayFilter='all';render()">Todo</button>${days.map(d=>`<button class="day ${dayFilter===d?'active':''}" onclick="dayFilter=${d};render()">${d}</button>`).join('')}</div>${base.map(eventCard).join('')||'<div class="empty">No hay eventos para este día.</div>'}`;
  }
  if(active==='avisos'){const avis=filtered(rows.filter(r=>cat(r).includes('AVISO')||isUrgent(r))); document.getElementById('p-avisos').innerHTML=(urg.length?`<div class="urgent-title">🚨 ÚLTIMA HORA</div>${urg.map(eventCard).join('')}`: '') + `<div class="section-title">Avisos</div>${avis.filter(r=>!isUrgent(r)).map(eventCard).join('')||'<div class="empty">No hay avisos.</div>'}`;}
  if(active==='fotos'){const fotos=filtered(rows.filter(r=>image(r)||cat(r).includes('FOTO'))); document.getElementById('p-fotos').innerHTML=fotos.map(eventCard).join('')||'<div class="empty">No hay fotos todavía.</div>';}
  if(active==='utilidades'){document.getElementById('p-utilidades').innerHTML=renderUtilities();}
  if(active==='datos'){document.getElementById('p-datos').innerHTML=`<div class="card"><b>Estado</b><p>${document.getElementById('status').textContent}</p><p>Eventos cargados: <b>${rows.length}</b></p><p>Hoja conectada: <b>${SHEET_ID}</b></p><button class="primary" onclick="loadData()">Actualizar datos</button></div>`;}
}
function findLink(names){const r=rows.find(x=>cat(x).includes('UBIC') && names.some(n=>norm(title(x)).includes(n))); return r ? (link(r)||loc(r)) : '';}
function renderUtilities(){
 const pena=findLink(['PEÑA','BRONCE']); const cuad=findLink(['CUADRILLA','ESTAMOS']);
 const utils=[
  ['🍻','Dónde está la Peña',pena], ['👥','Dónde está la cuadrilla',cuad], ['🚌','Villavesas','https://www.infotuc.es/'], ['🚕','Taxis Pamplona','https://www.google.com/search?q=taxi+pamplona'], ['🅿️','Parkings','https://www.google.com/maps/search/parking+pamplona'], ['🚑','Emergencias 112','tel:112'], ['👮','Policía Municipal','tel:092'], ['💊','Farmacias','https://www.google.com/maps/search/farmacias+pamplona'], ['🚻','Baños públicos','https://www.google.com/maps/search/baños+públicos+pamplona'], ['🌤️','Tiempo Pamplona','https://www.aemet.es/es/eltiempo/prediccion/municipios/pamplona-iruna-id31201']
 ];
 return `<div class="utility-grid">${utils.map(u=>u[2]?`<a class="util" href="${safe(u[2])}" target="_blank"><span>${u[0]}</span>${u[1]}</a>`:`<div class="util" style="opacity:.45"><span>${u[0]}</span>${u[1]}<br><small>sin enlace</small></div>`).join('')}</div>`;
}
function openInfo(t,d){document.getElementById('modalContent').innerHTML=`<h2>${safe(t)}</h2><div class="modal-text">${safe(d)}</div>`; document.getElementById('modal').classList.add('show');}
function openImage(src){document.getElementById('modalContent').innerHTML=`<img class="modal-img" src="${src}">`; document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
document.getElementById('refreshBtn').onclick=loadData; document.getElementById('search').addEventListener('input',e=>{query=e.target.value; renderPanel();});
loadData();
</script>
</body>
</html>

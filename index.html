<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Andanada 12</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#cf171f">
<style>
:root{--red:#cf171f;--red2:#a71117;--blue:#0b6fad;--text:#1f2937;--muted:#6b7280;--bg:#f5f5f5;--card:#fff;--soft:#eef5ff;--shadow:0 14px 32px rgba(0,0,0,.12)}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.hero{background:linear-gradient(135deg,var(--red),#e02028 60%,var(--red2));color:#fff;padding:28px 28px 34px;position:sticky;top:0;z-index:5;box-shadow:0 6px 24px rgba(0,0,0,.18)}
.checks{height:28px;border-radius:20px;background:repeating-conic-gradient(#0b6fad 0 25%,#fff 0 50%) 0/38px 38px;margin-bottom:18px;max-width:440px;border:2px solid rgba(255,255,255,.8)}
h1{font-size:clamp(42px,10vw,78px);line-height:.95;margin:0;font-weight:900;letter-spacing:.02em}.subtitle{font-size:clamp(20px,4vw,30px);font-weight:750;margin-top:16px;max-width:600px}.topActions{position:absolute;right:26px;top:34px}.refresh{border:0;border-radius:32px;background:#fff;color:var(--red);font-weight:900;font-size:20px;padding:18px 24px;box-shadow:var(--shadow)}
.nav{display:flex;gap:12px;overflow:auto;padding:18px 22px 14px;background:#fff;position:sticky;top:194px;z-index:4;box-shadow:0 4px 18px rgba(0,0,0,.06)}
.nav button{border:0;border-radius:28px;background:#f4f6f8;color:#1f2937;font-weight:900;font-size:16px;padding:14px 20px;white-space:nowrap}.nav button.active{background:var(--red);color:#fff}
.wrap{max-width:920px;margin:0 auto;padding:24px 18px 90px}.daytabs{display:flex;gap:8px;overflow:auto;margin:8px 0 20px}.daytabs button{border:0;border-radius:18px;padding:12px 18px;font-weight:900;background:#eaf2ff;color:#16476b}.daytabs button.active{background:var(--blue);color:#fff}
.card{background:var(--card);border-radius:24px;padding:24px 26px;margin:18px 0;box-shadow:var(--shadow);border-left:8px solid var(--red)}
.card h2{margin:0 0 14px;font-size:clamp(26px,5vw,38px);line-height:1.05}.icon{font-size:24px;margin-right:10px}.chips{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 18px}.chip{background:#eaf2ff;color:#16476b;border-radius:20px;padding:8px 14px;font-weight:900}.chip.red{background:#ffe5e7;color:#9d1117}.summary{font-size:20px;line-height:1.35;margin:12px 0;color:#2d3748;white-space:pre-line}.muted{color:var(--muted)}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:16px;padding:12px 18px;font-size:16px;font-weight:900;background:var(--blue);color:white;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.secondary{background:#eef2f7;color:#243041}.btn.red{background:var(--red)}
.empty{font-size:22px;text-align:center;color:#777;margin:70px 0}.notice{border-left-color:#f59e0b}.photoGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}.photo{background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.photo img{width:100%;height:150px;object-fit:cover;display:block}.photo .cap{padding:12px;font-weight:800}.utilGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}.util{border-radius:22px;background:#fff;padding:20px;box-shadow:var(--shadow);border-left:7px solid var(--blue)}.util h3{margin:0 0 10px;font-size:22px}.small{font-size:13px;color:#777;margin-top:24px;text-align:center}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:end;z-index:20}.modal.open{display:flex}.sheet{background:#fff;width:100%;max-height:86vh;overflow:auto;border-radius:28px 28px 0 0;padding:26px;box-shadow:0 -14px 40px rgba(0,0,0,.25)}.sheet h2{font-size:30px;margin:0 0 14px}.long{font-size:18px;line-height:1.5;white-space:pre-line}.close{float:right;border:0;border-radius:18px;background:#eee;font-weight:900;padding:10px 14px}.error{background:#fff1f2;border-left:8px solid var(--red);border-radius:22px;padding:22px;color:#991b1b;font-size:20px;font-weight:800}.search{width:100%;border:2px solid #e5e7eb;border-radius:18px;padding:14px 16px;font-size:18px;margin:0 0 14px}
@media(max-width:620px){.hero{padding:30px 26px 34px}.topActions{right:22px;top:36px}.refresh{font-size:18px;padding:15px 20px}.nav{top:204px}.wrap{padding:18px 12px 80px}.card{padding:22px 24px;margin:16px 0}.summary{font-size:19px}}
</style>
</head><body>
<header class="hero"><div class="checks"></div><div class="topActions"><button class="refresh" onclick="loadData(true)">Actualizar</button></div><h1>ANDANADA<br>12</h1><div class="subtitle">Calendario, avisos, fotos, utilidades y planes de la cuadrilla</div></header>
<nav class="nav"><button data-view="inicio" class="active">Inicio</button><button data-view="calendario">Calendario</button><button data-view="avisos">Avisos</button><button data-view="fotos">Fotos</button><button data-view="utilidades">Utilidades</button><button data-view="datos">Datos</button></nav>
<main class="wrap"><input id="search" class="search" placeholder="Buscar en Andanada 12…" oninput="render()"><section id="app"></section><div class="small">Datos desde Google Sheets · Andanada 12</div></main>
<div id="modal" class="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="sheet"><button class="close" onclick="closeModal()">Cerrar</button><h2 id="modalTitle"></h2><div id="modalBody" class="long"></div></div></div>
<script>
const SHEET_ID='1XsUj8jiH8qNgx9-aQV7ptv4uStep6Eo7cMogi9IFZ7g';
const SHEET_NAME='Hoja 1';
let rows=[], view='inicio', selectedDay=null;
const $=s=>document.querySelector(s);
const norm=s=>(s||'').toString().trim();
const upper=s=>norm(s).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function val(r,...keys){for(const k of keys){const found=Object.keys(r).find(x=>upper(x)===upper(k)); if(found && r[found]!=null && r[found]!==undefined) return norm(r[found]);} return ''}
function parseTime(t){t=norm(t).replace('.',':').replace('h',':').replace(',',':'); if(!t)return 9999; const m=t.match(/(\d{1,2})(?::(\d{1,2}))?/); if(!m)return 9999; return (+m[1])*60+(+(m[2]||0));}
function parseDay(d){const m=norm(d).match(/\d+/); return m?+m[0]:999;}
function icon(cat){cat=upper(cat); if(cat.includes('ENCI'))return'🐂'; if(cat.includes('CORR'))return'🎟️'; if(cat.includes('PEÑA')||cat.includes('BRONCE'))return'🎺'; if(cat.includes('GIG'))return'👑'; if(cat.includes('COMIDA')||cat.includes('ALMUERZO')||cat.includes('CENA'))return'🍽️'; if(cat.includes('AVISO'))return'📌'; if(cat.includes('FOTO'))return'📷'; if(cat.includes('UBIC')||cat.includes('MAPA'))return'📍'; if(cat.includes('TXUP')||cat.includes('CHUP'))return'🎉'; return'🔹'}
function sortRows(a,b){const da=parseDay(val(a,'DIA','DÍA')), db=parseDay(val(b,'DIA','DÍA')); if(da!==db)return da-db; return parseTime(val(a,'HORA'))-parseTime(val(b,'HORA'));}
function filtered(){const q=upper($('#search').value); let arr=[...rows].sort(sortRows); if(q) arr=arr.filter(r=>upper(Object.values(r).join(' ')).includes(q)); return arr;}
function isCat(r,c){return upper(val(r,'CATEGORIA','CATEGORÍA')).includes(upper(c));}
function visibleEvents(){return filtered().filter(r=>!isCat(r,'UBICACION')&&!isCat(r,'UTILIDAD')&&!isCat(r,'FOTO'))}
function card(r){const dia=val(r,'DIA','DÍA'), cat=val(r,'CATEGORIA','CATEGORÍA'), hora=val(r,'HORA'), titulo=val(r,'TITULO','TÍTULO')||cat, subt=val(r,'SUBTITULO','SUBTÍTULO','DETALLE','RESUMEN'), det=val(r,'DESCRIPCION','DESCRIPCIÓN','INFO','INFORMACION','INFORMACIÓN'); const enlace=val(r,'ENLACE','LINK','URL','UBICACION','UBICACIÓN'); const hasLong=det && det!==subt; return `<article class="card ${isCat(r,'AVISO')?'notice':''}"><h2><span class="icon">${icon(cat)}</span>${escapeHtml(titulo)}</h2><div class="chips">${dia?`<span class="chip">Día ${escapeHtml(dia)}</span>`:''}${cat?`<span class="chip red">${escapeHtml(cat)}</span>`:''}${hora?`<span class="chip">${escapeHtml(hora)}</span>`:''}</div>${subt?`<div class="summary">${escapeHtml(subt)}</div>`:''}<div class="btnrow">${hasLong?`<button class="btn" onclick='openInfo(${JSON.stringify(titulo)},${JSON.stringify(det)})'>Ver información</button>`:''}${enlace?`<a class="btn secondary" href="${escapeAttr(enlace)}" target="_blank">Abrir enlace</a>`:''}</div></article>`}
function render(){const app=$('#app'); if(view==='inicio'){const ev=visibleEvents().slice(0,6); app.innerHTML=`<h2>Próximos planes</h2>${ev.map(card).join('')||'<div class="empty">No hay eventos.</div>'}`;return}
 if(view==='calendario'){const days=[...new Set(filtered().map(r=>parseDay(val(r,'DIA','DÍA'))).filter(d=>d!==999))].sort((a,b)=>a-b); if(!selectedDay&&days.length) selectedDay=days[0]; const ev=visibleEvents().filter(r=>parseDay(val(r,'DIA','DÍA'))===selectedDay); app.innerHTML=`<div class="daytabs">${days.map(d=>`<button class="${d===selectedDay?'active':''}" onclick="selectedDay=${d};render()">${d} julio</button>`).join('')}</div><h2>Día ${selectedDay||''}</h2>${ev.map(card).join('')||'<div class="empty">No hay eventos para este día.</div>'}`;return}
 if(view==='avisos'){const ev=filtered().filter(r=>isCat(r,'AVISO')); app.innerHTML=ev.map(card).join('')||'<div class="empty">No hay avisos.</div>';return}
 if(view==='fotos'){const ev=filtered().filter(r=>isCat(r,'FOTO')); app.innerHTML=`<div class="photoGrid">${ev.map(photoCard).join('')}</div>${ev.length?'':'<div class="empty">No hay fotos.</div>'}`;return}
 if(view==='utilidades'){app.innerHTML=utilidades();return}
 if(view==='datos'){app.innerHTML=`<article class="card"><h2>Cómo editar</h2><div class="summary">Edita el Google Sheets. Usa columnas: DIA · CATEGORIA · HORA · TITULO · SUBTITULO · DETALLE · DESCRIPCION · UBICACION · ENLACE.\n\nSUBTITULO/DETALLE se muestra en la tarjeta.\nDESCRIPCION sale al pulsar Ver información.\nENLACE abre Maps, Drive o una web.</div><a class="btn" href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank">Abrir Google Sheets</a></article>`;}
}
function photoCard(r){const url=val(r,'ENLACE','DETALLE','URL'); const title=val(r,'TITULO','TÍTULO')||'Foto'; const img=driveImage(url); return `<div class="photo"><a href="${escapeAttr(url)}" target="_blank">${img?`<img src="${escapeAttr(img)}">`:`<div style="height:150px;display:grid;place-items:center;font-size:42px">📷</div>`}</a><div class="cap">${escapeHtml(title)}</div></div>`}
function driveImage(url){const m=norm(url).match(/\/d\/([^/]+)/)||norm(url).match(/[?&]id=([^&]+)/); return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`:''}
function utilRow(key){return rows.find(r=>isCat(r,'UBICACION')&&(upper(val(r,'TITULO','TÍTULO')).includes(upper(key))||upper(val(r,'SUBTITULO','DETALLE')).includes(upper(key))))}
function utilidades(){const pena=utilRow('PEÑA'), cuad=utilRow('CUADRILLA'); const u=[['📍','Dónde está la Peña',val(pena||{},'ENLACE','UBICACION','UBICACIÓN')],['👥','Dónde está la cuadrilla',val(cuad||{},'ENLACE','UBICACION','UBICACIÓN')],['🚌','Villavesas','https://www.infotuc.es/'],['🚖','Taxis Pamplona','https://www.google.com/search?q=taxi+pamplona'],['🅿️','Parkings','https://www.google.com/maps/search/parking+pamplona'],['🚑','Emergencias 112','tel:112'],['👮','Policía Municipal','tel:092'],['💊','Farmacias','https://www.google.com/maps/search/farmacia+pamplona']];return `<div class="utilGrid">${u.map(x=>`<div class="util"><h3>${x[0]} ${x[1]}</h3>${x[2]?`<a class="btn" href="${escapeAttr(x[2])}" target="_blank">Abrir</a>`:'<span class="muted">Añade enlace en Sheets</span>'}</div>`).join('')}</div>`}
function openInfo(t,b){$('#modalTitle').textContent=t; $('#modalBody').textContent=b; $('#modal').classList.add('open')}function closeModal(){$('#modal').classList.remove('open')}
function escapeHtml(s){return norm(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function escapeAttr(s){return escapeHtml(s)}
async function loadData(){const app=$('#app'); app.innerHTML='<div class="empty">Cargando datos…</div>'; try{const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&cache=${Date.now()}`; const res=await fetch(url); const txt=await res.text(); const json=JSON.parse(txt.substring(txt.indexOf('{'),txt.lastIndexOf('}')+1)); const cols=json.table.cols.map(c=>c.label||''); rows=json.table.rows.map(row=>{const o={}; cols.forEach((c,i)=>o[c]=row.c[i]?.f ?? row.c[i]?.v ?? ''); return o}).filter(r=>Object.values(r).some(Boolean)); rows.sort(sortRows); render();}catch(e){app.innerHTML=`<div class="error">Error al cargar<br><span style="font-weight:500">${escapeHtml(e.message)}<br>Comprueba que Google Sheets esté compartido como “Cualquier persona con el enlace: Lector”.</span></div>`}}
for(const b of document.querySelectorAll('.nav button')) b.onclick=()=>{document.querySelector('.nav .active').classList.remove('active');b.classList.add('active');view=b.dataset.view;render()};
loadData();
</script>
</body></html>
